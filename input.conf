# === ANIME4K ШЕЙДЕРЫ ===
CTRL+1 no-osd set glsl-shaders "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"; show-text "Anime4K: Mode A"
CTRL+2 no-osd set glsl-shaders "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "Anime4K: Mode B"
CTRL+3 no-osd set glsl-shaders "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_S.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"; show-text "Anime4K: Mode C"
CTRL+4 no-osd set glsl-shaders "~~/shaders/Anime4K_Denoise_Bilateral_Mode.glsl"; show-text "Anime4K: Denoise"
CTRL+5 no-osd set glsl-shaders "~~/shaders/Anime4K_Darken_HQ.glsl:~~/shaders/Anime4K_Thin_HQ.glsl"; show-text "Anime4K: Lines"
CTRL+0 no-osd set glsl-shaders ""; show-text "Shaders: OFF"

# === TOGGLE КАЧЕСТВО (Shift+Tab) ===
SHIFT+TAB cycle-values scale spline36 bilinear ewa_lanczossharp; cycle-values cscale spline36 bilinear ewa_lanczossharp; show-text "Scale: ${scale}"

# === СКОРОСТЬ ===
) add speed 0.1; show-text "Speed: ${speed}"
( add speed -0.1; show-text "Speed: ${speed}"
BS set speed 1.0; show-text "Speed: 1.0"

# === ЯРКОСТЬ ===
> add brightness 1; show-text "Brightness: ${brightness}"
< add brightness -1; show-text "Brightness: ${brightness}"

# === ГАММА ===
G add gamma 1; show-text "Gamma: ${gamma}"
g add gamma -1; show-text "Gamma: ${gamma}"

# === КОНТРАСТ ===
= add contrast 1; show-text "Contrast: ${contrast}"
- add contrast -1; show-text "Contrast: ${contrast}"

# === РЕЗКОСТЬ ===
; add sharpen 0.1; show-text "Sharpen: ${sharpen}"
' add sharpen -0.1; show-text "Sharpen: ${sharpen}"

# === НАСЫЩЕННОСТЬ ===
. add saturation 1; show-text "Saturation: ${saturation}"
, add saturation -1; show-text "Saturation: ${saturation}"

# === ЭКСПОЗИЦИЯ ===
] add gamma 1; add contrast 0.5; show-text "Exposure+"
[ add gamma -1; add contrast -0.5; show-text "Exposure-"

# === DEBAND ===
D cycle deband; show-text "Deband: ${deband}"

# === HDR ===
H cycle-values tone-mapping auto mobius reinhard hable bt.2390; show-text "Tone mapping: ${tone-mapping}"
h cycle-values target-colorspace-hint yes no; show-text "HDR hint: ${target-colorspace-hint}"

# === ЗУМ ===
C add video-zoom 0.1; show-text "Zoom: ${video-zoom}"
c add video-zoom -0.1; show-text "Zoom: ${video-zoom}"

# === ASPECT ===
A cycle-values video-aspect-override 16:9 4:3 21:9 -1; show-text "Aspect: ${video-aspect-override}"

# === РАЗМЕР ОКНА ===
1 set window-scale 0.25; show-text "25%"
2 set window-scale 0.5; show-text "50%"
3 set window-scale 0.75; show-text "75%"
4 set window-scale 1.0; show-text "100%"

# === КАЧЕСТВО ВИДЕО ===
F script-binding quality_menu/video_formats_toggle
ALT+1 set ytdl-format "worstvideo+worstaudio/worst"; show-text "Quality: Lowest"
ALT+2 set ytdl-format "bestvideo[height<=480]+bestaudio/best"; show-text "Quality: 480p"
ALT+3 set ytdl-format "bestvideo[height<=720]+bestaudio/best"; show-text "Quality: 720p"
ALT+4 set ytdl-format "bestvideo[height<=1080]+bestaudio/best"; show-text "Quality: 1080p"
ALT+0 set ytdl-format "bestvideo+bestaudio/best"; show-text "Quality: Best"

# === СКРИНШОТ ===
s screenshot; show-text "Screenshot saved"

# === LOOP ===
l ab-loop; show-text "Loop: ${ab-loop-a} - ${ab-loop-b}"
L set ab-loop-a no; set ab-loop-b no; show-text "Loop cleared"

# === ПЕРЕМОТКА ===
LEFT seek -5
RIGHT seek 5
SHIFT+UP seek 60
SHIFT+DOWN seek -60

# === ГРОМКОСТЬ ===
WHEEL_UP add volume 2
WHEEL_DOWN add volume -2
m cycle mute

# === СБРОС ===
R set sharpen 0; set contrast 0; set brightness 0; set gamma 0; set saturation 0; set video-zoom 0; set speed 1.0; show-text "Reset all"

# === ИНТЕРПОЛЯЦИЯ ===
I cycle interpolation; show-text "Interpolation: ${interpolation}"
